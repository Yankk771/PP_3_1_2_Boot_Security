<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
</head>
<body>

<h1>Редактирование пользователя</h1>

<form th:action="@{/admin/update}" method="post">

    <input type="hidden" name="id" th:value="${user.id}">

    Имя:
    <input type="text" name="name" th:value="${user.name}"><br><br>

    Фамилия:
    <input type="text" name="lastName" th:value="${user.lastName}"><br><br>

    Возраст:
    <input type="number" name="age" th:value="${user.age}"><br><br>

    Логин:
    <input type="text" name="username" th:value="${user.username}"><br><br>

    <input type="submit" value="Сохранить">

</form>

</body>
</html>
